  <script>
  document.addEventListener("DOMContentLoaded", function () {
    const toggle = document.querySelector(".nav-toggle");
    const menu = document.querySelector(".nav-menu");

    toggle.addEventListener("click", function () {
      menu.classList.toggle("open");
    });

    document.querySelectorAll(".nav-menu a").forEach(link => {
      link.addEventListener("click", () => {
        menu.classList.remove("open");
      });
    });
  });
</script>

  <script>
document.addEventListener("DOMContentLoaded", function () {
  const toggles = document.querySelectorAll(".icon-toggle");

 
  // click on first item on page open
  //if (toggles.length > 0) {
  //  toggles[0].click(); 
  //}

  toggles.forEach((toggle) => {
    toggle.addEventListener("click", function () {
      const textId = toggle.dataset.text;
      const currentDropdown = document.getElementById(textId);

      // Hide all other text blocks
      document.querySelectorAll(".icon-text").forEach((block) => {
        if (block !== currentDropdown) {
          block.classList.remove("open");
        }
      });

      // Toggle current block
      currentDropdown.classList.toggle("open");
    });
  });
});
</script>
  
  <!--Script for header scrolling -->
  <script>
document.addEventListener("DOMContentLoaded", function () {
  const header = document.querySelector(".site-header");
  const body = document.body;
  const sections = document.querySelectorAll("section[id]");

  if (!header || sections.length === 0) return;

  const isHome = body.classList.contains("home");

  if (!isHome) {
    header.classList.add("scrolled");
    return;
  }

  let currentSection = null;

  const observer = new IntersectionObserver(
    (entries) => {
      // Find the most visible section
      let visible = entries
        .filter(entry => entry.isIntersecting)
        .sort((a, b) => b.intersectionRatio - a.intersectionRatio)[0];

      if (!visible) return;

      const id = visible.target.id;

      // Avoid unnecessary DOM updates
      if (currentSection === id) return;
      currentSection = id;

      // 🔹 Update body classes
      sections.forEach(sec => {
        body.classList.remove(`section-${sec.id}`);
      });
      body.classList.add(`section-${id}`);

      // 🔹 Header logic (binary)
      if (window.scrollY > 100) {
        header.classList.add("scrolled");
      } else {
        header.classList.remove("scrolled");
      }
    },
    {
      threshold: [0.25, 0.5, 0.75], // multiple thresholds = smoother switching
    }
  );

  sections.forEach(section => observer.observe(section));
});
</script>
  
  <script> // Sliding text script
  document.addEventListener("DOMContentLoaded", () => {
    const observer = new IntersectionObserver(
      (entries, observer) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add("visible");
            observer.unobserve(entry.target);
          }
        });
      },
      {
        root: null,
        threshold: 0.6, // How much of the element is necessary to be in screen
        // rootMargin: "0px 0px -200px 0px" // Distnace the item nees to be in the screen to trigger 
      }
    );

    document.querySelectorAll(".text-slide").forEach(el => {
      observer.observe(el);
    });
  });
</script>
