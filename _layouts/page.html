  <script>
  document.addEventListener("DOMContentLoaded", function () {
    const toggle = document.querySelector(".nav-toggle");
    const menu = document.querySelector(".nav-menu");

    toggle.addEventListener("click", function () {
      menu.classList.toggle("open");
    });

    document.querySelectorAll(".nav-menu a").forEach(link => {
      link.addEventListener("click", () => {
        menu.classList.remove("open");
      });
    });
  });
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const toggles = document.querySelectorAll(".icon-toggle");

  toggles.forEach((toggle) => {
    toggle.addEventListener("click", function () {
      const textId = toggle.dataset.text;
      const currentDropdown = document.getElementById(textId);

      // Hide all other text blocks
      document.querySelectorAll(".icon-text").forEach((block) => {
        if (block !== currentDropdown) {
          block.classList.remove("open");
        }
      });

      // Toggle current block
      currentDropdown.classList.toggle("open");
    });
  });
});
</script>

<!-- Script for header scrolling -->
<script>
document.addEventListener("DOMContentLoaded", function () {
  const header = document.querySelector(".site-header");
  const body = document.body;
  const sections = document.querySelectorAll("section[id]");

  if (!header || sections.length === 0) return;

  const isHome = body.classList.contains("home");

  if (!isHome) {
    header.classList.add("scrolled");
    return;
  }

  // Scrolled
  let isScrolled = false;

  window.addEventListener("scroll", () => {
    const shouldScroll = window.scrollY > 100;

    if (shouldScroll !== isScrolled) {
      header.classList.toggle("scrolled", shouldScroll);
      isScrolled = shouldScroll;
    }
  });

  // Section tracking
  let currentSection = null;

  const observer = new IntersectionObserver((entries) => {
    let currentSection = null;
const visibleSections = new Map();

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    const id = entry.target.id;

    if (entry.isIntersecting) {
      visibleSections.set(id, entry.intersectionRatio);
    } else {
      visibleSections.delete(id);
    }
  });

  if (visibleSections.size === 0) return;

  // Find most visible section from ALL visible ones
  let bestId = null;
  let bestRatio = 0;

  visibleSections.forEach((ratio, id) => {
    if (ratio > bestRatio) {
      bestRatio = ratio;
      bestId = id;
    }
  });

  if (!bestId || currentSection === bestId) return;
  currentSection = bestId;

  sections.forEach(sec => {
    body.classList.remove(`section-${sec.id}`);
  });
  body.classList.add(`section-${bestId}`);
});

<script>
document.addEventListener("DOMContentLoaded", () => {
  const observer = new IntersectionObserver(
    (entries, observer) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add("visible");
          observer.unobserve(entry.target);
        }
      });
    },
    {
      root: null,
      threshold: 0.6,
    }
  );

  document.querySelectorAll(".text-slide").forEach(el => {
    observer.observe(el);
  });
});
</script>
