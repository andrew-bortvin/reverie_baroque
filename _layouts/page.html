  <script>

    const menu = document.querySelector(".nav-menu");

    toggle.addEventListener("click", function () {

  <script>
document.addEventListener("DOMContentLoaded", function () {

  /* =========================
     NAV TOGGLE
  ========================== */
  const toggle = document.querySelector(".nav-toggle");
  const menu = document.querySelector(".nav-menu");

  if (toggle && menu) {
    toggle.addEventListener("click", function () {
      menu.classList.toggle("open");
    });

    document.querySelectorAll(".nav-menu a").forEach(link => {
      link.addEventListener("click", () => {
        menu.classList.remove("open");
      });
    });
  }


  /* =========================
     ICON TOGGLES
  ========================== */
  const toggles = document.querySelectorAll(".icon-toggle");

  toggles.forEach((toggle) => {
    toggle.addEventListener("click", function () {
      const textId = toggle.dataset.text;
      const currentDropdown = document.getElementById(textId);

      if (!currentDropdown) return;

      document.querySelectorAll(".icon-text").forEach((block) => {
        if (block !== currentDropdown) {
          block.classList.remove("open");
        }
      });

      currentDropdown.classList.toggle("open");
    });
  });


  /* =========================
     HEADER SCROLL (SMOOTH + STABLE)
     - triggers after 1 viewport height
  ========================== */
  const header = document.querySelector(".site-header");
  const body = document.body;

  if (header) {
    const isHome = body.classList.contains("home");

    if (!isHome) {
      header.classList.add("scrolled");
    } else {
      let lastState = null;
      let ticking = false;

      const updateHeader = () => {
        ticking = false;

        const shouldScroll = window.scrollY > window.innerHeight * 0.60;

        if (shouldScroll === lastState) return;
        lastState = shouldScroll;

        header.classList.toggle("scrolled", shouldScroll);
      };

      window.addEventListener("scroll", () => {
        if (!ticking) {
          ticking = true;
          requestAnimationFrame(updateHeader);
        }
      }, { passive: true });

      updateHeader();
    }
  }


  /* =========================
     SECTION OBSERVER (BODY STATES)
  ========================== */
  const sections = document.querySelectorAll("section[id]");

  if (sections.length) {
    let currentSection = null;

    const observer = new IntersectionObserver(
      (entries) => {
        const visible = entries
          .filter(e => e.isIntersecting)
          .sort((a, b) => b.intersectionRatio - a.intersectionRatio)[0];

        if (!visible) return;

        const id = visible.target.id;

        if (id === currentSection) return;
        currentSection = id;

        sections.forEach(sec => {
          body.classList.remove(`section-${sec.id}`);
        });

        body.classList.add(`section-${id}`);
      },
      {
        threshold: [0.2, 0.4, 0.6, 0.8]
      }
    );

    sections.forEach(section => observer.observe(section));
  }


  /* =========================
     SLIDE-IN TEXT ANIMATION
  ========================== */
  const slideObserver = new IntersectionObserver(
    (entries, observer) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add("visible");
          observer.unobserve(entry.target);
        }
      });
    },
    {
      threshold: 0.6
    }
  );

  document.querySelectorAll(".text-slide").forEach(el => {
    slideObserver.observe(el);
  });

});
</script>
  
  <!--Header and footer-->
<body class="
  {% if page.url == '/' or page.url == '/index.html' %}home{% else %}not-home{% endif %}
  {% if page.after_banner %}after-banner{% endif %}
">
    {% include header.html %}
    <main class="page-content">
      {{ content }}
    </main>
     {% include footer.html %}
  </body>
</html>
